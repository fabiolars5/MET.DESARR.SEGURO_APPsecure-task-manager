<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Secure Task Manager</title>

  <style>
    :root {
      --bg: #eef2ff;
      --bg-2: #f8fafc;
      --card: rgba(255, 255, 255, 0.92);
      --text: #0f172a;
      --muted: #64748b;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --secondary: #475569;
      --secondary-dark: #334155;
      --danger: #ef4444;
      --danger-dark: #dc2626;
      --success-bg: #ecfdf5;
      --success-text: #065f46;
      --success-border: #10b981;
      --border: #e2e8f0;
      --shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #dbeafe 0, transparent 32%),
        radial-gradient(circle at bottom right, #c7d2fe 0, transparent 28%),
        linear-gradient(135deg, var(--bg), var(--bg-2));
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: var(--radius);
      padding: 34px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    h1 {
      margin: 0 0 26px;
      text-align: center;
      font-size: 34px;
      letter-spacing: -0.04em;
      color: var(--text);
    }

    h2 {
      margin-top: 0;
      font-size: 26px;
      letter-spacing: -0.03em;
    }

    h3 {
      color: var(--text);
      margin-bottom: 10px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 700;
      color: #334155;
    }

    input,
    textarea {
      width: 100%;
      padding: 13px 14px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      color: var(--text);
      background: #ffffff;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    input:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.14);
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    button {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.22);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.28);
    }

    button:active {
      transform: translateY(0);
    }

    a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }

    a:hover {
      text-decoration: underline;
    }

    form {
      margin: 14px 0;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 26px 0;
    }

    .flash {
      background: var(--success-bg);
      color: var(--success-text);
      border: 1px solid #bbf7d0;
      border-left: 6px solid var(--success-border);
      padding: 13px 14px;
      border-radius: 12px;
      margin-bottom: 18px;
      font-weight: 600;
    }

    .task {
      background: rgba(248, 250, 252, 0.95);
      border: 1px solid var(--border);
      padding: 18px;
      margin: 14px 0;
      border-radius: 16px;
      transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
    }

    .task:hover {
      transform: translateY(-2px);
      border-color: #bfdbfe;
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.08);
    }

    .done {
      text-decoration: line-through;
      color: var(--muted);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 22px;
    }

    .logout {
      background: linear-gradient(135deg, var(--danger), var(--danger-dark));
      box-shadow: 0 8px 18px rgba(239, 68, 68, 0.22);
    }

    .logout:hover {
      box-shadow: 0 12px 24px rgba(239, 68, 68, 0.28);
    }

    .secondary {
      background: linear-gradient(135deg, var(--secondary), var(--secondary-dark));
      box-shadow: 0 8px 18px rgba(71, 85, 105, 0.18);
    }

    .danger {
      background: linear-gradient(135deg, var(--danger), var(--danger-dark));
      box-shadow: 0 8px 18px rgba(239, 68, 68, 0.2);
    }

    .small-text {
      font-size: 14px;
      color: var(--muted);
      margin: 4px 0;
    }

    .badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .badge-pending {
      background: #fef3c7;
      color: #92400e;
    }

    .badge-done {
      background: #dcfce7;
      color: #166534;
    }

    @media (max-width: 640px) {
      .container {
        padding: 24px 12px;
      }

      .card {
        padding: 22px;
      }

      h1 {
        font-size: 28px;
      }

      .top-bar {
        flex-direction: column;
        align-items: flex-start;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>Secure Task Manager</h1>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          {% for message in messages %}
            <p class="flash">{{ message }}</p>
          {% endfor %}
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </div>
  </div>
</body>
</html>
